version: 0.2

phases:
  install:
    commands:
      - yum install -y java-17-amazon-corretto
      - export JAVA_HOME=/usr/lib/jvm/java-17-amazon-corretto.x86_64
      - export PATH=$JAVA_HOME/bin:$PATH
      - java -version
    # runtime-versions:
    #   java: corretto17
  pre_build:
    commands:
      - echo Logging in to AWS CodeArtifact...
      # - CODEARTIFACT_AUTH_TOKEN=`aws codeartifact get-authorization-token --domain nextwork --domain-owner 607743448762 --region ap-south-1 --query authorizationToken --output text`
      # - export CODEARTIFACT_AUTH_TOKEN
  build:
    commands:
      - echo Build started on `date`
      # - mvn clean install
      - mvn clean package
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Packaging artifacts...
      # - mvn package
      - echo "changing the permissions of scripts.."
      - chmod +x scripts/*.sh 
artifacts:
  files:
    - target/webapp.war
    - scripts/**/*
    - appspec.yml
  discard-paths: no
